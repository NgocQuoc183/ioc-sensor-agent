name: Remote SSH Deploy

on:
  push:
    branches: [ main ] # Kích hoạt khi push code vào nhánh main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute remote SSH commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /home/raspi/Project/ioc-sensor-agent
            git pull origin main
            
            # Khắc phục lỗi lockfile trùng lặp cũ:
            rm -f yarn.lock pnpm-lock.yaml
            
            # Cài đặt lại thư viện bằng npm sạch sẽ
            npm install
